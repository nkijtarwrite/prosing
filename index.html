<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2; url=Main.html">
    <title>跳轉中...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
            background-color: #f8f9fa;
            color: #2c3e50;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(52, 152, 219, 0.1);
            border-top: 5px solid #3498db;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        h2 {
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>正在前往個人網站</h2>
        <p>頁面將在 2 秒後自動跳轉...</p>
    </div>
</body>
</html>
